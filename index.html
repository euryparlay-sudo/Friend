<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Great People - Final Fix</title>
    <style>
        :root {
            --book-w: 165px; 
            --book-h: 250px; 
            --paper-bg: #1a1a1a; 
        }

        body {
            margin: 0; padding: 0;
            background-color: #000;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            perspective: 1500px;
        }

        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; display: flex; justify-content: center;
            align-items: center; z-index: 100; cursor: pointer;
        }

        .fade-text {
            position: absolute; font-size: 3rem; font-weight: bold;
            opacity: 0; text-align: center; width: 100%; letter-spacing: 5px;
        }

        .animate-now { animation: fadeInOut 3s forwards; }

        @keyframes fadeInOut {
            0% { opacity: 0; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1); }
            100% { opacity: 0; transform: scale(1.1); }
        }

        #main-stage {
            display: none;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        .book {
            width: var(--book-w);
            height: var(--book-h);
            position: relative;
            transform-style: preserve-3d;
            transition: transform 1.5s, opacity 1s;
            transform: translateX(calc(var(--book-w) / 2));
        }

        .page {
            width: 100%; height: 100%;
            position: absolute; top: 0; left: 0;
            transform-origin: left;
            transform-style: preserve-3d;
            transition: transform 1.2s cubic-bezier(0.645, 0.045, 0.355, 1);
        }

        .front, .back {
            position: absolute;
            width: 100%; height: 100%;
            backface-visibility: hidden;
            display: flex; justify-content: center; align-items: center;
            border: 1px solid #444;
            box-sizing: border-box;
            background: var(--paper-bg);
            box-shadow: inset 0 0 30px rgba(0,0,0,0.5);
        }

        .back { transform: rotateY(180deg); }
        img { width: 90%; height: 90%; object-fit: cover; }

        #message {
            position: absolute;
            text-align: center;
            font-size: 1.1rem;
            width: 85%;
            max-width: 450px;
            opacity: 0;
            line-height: 1.8;
            transition: 2.5s all ease;
            pointer-events: none;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -40%);
        }

        .show-msg { 
            opacity: 1 !important; 
            transform: translate(-50%, -50%) !important; 
        }

        .star {
            position: absolute; background: white; border-radius: 50%;
            pointer-events: none; animation: fall linear forwards;
            opacity: 0.4;
        }
        @keyframes fall { to { transform: translateY(110vh); } }
    </style>
</head>
<body>

    <audio id="bgMusic" loop><source src="music.mp3" type="audio/mpeg"></audio>

    <div id="overlay">Klik untuk Memulai...</div>

    <div id="text1" class="fade-text">Great</div>
    <div id="text2" class="fade-text">People</div>

    <div id="main-stage">
        <div class="book" id="myBook">
            <div class="page" style="z-index: 5;" id="p1">
                <div class="front">📖 OUR MEMORIES</div>
                <div class="back"><img src="foto1.jpg"></div>
            </div>
            <div class="page" style="z-index: 4;" id="p2">
                <div class="front"><img src="foto2.jpg"></div>
                <div class="back"><img src="foto3.jpg"></div>
            </div>
            <div class="page" style="z-index: 3;" id="p3">
                <div class="front"><img src="foto4.jpg"></div>
                <div class="back">FIN.</div>
            </div>
        </div>
    </div>

    <div id="message">
        Mungkin gue jarang bilang begini, tapi makasih ya sudah jadi teman-teman asik. <br><br>
        <b style="color: #ffd700; font-size: 1.2rem;">Cheers for more good times ahead, Guys!</b>
    </div>

    <script>
        const overlay = document.getElementById('overlay');
        const music = document.getElementById('bgMusic');
        const p1 = document.getElementById('p1');
        const p2 = document.getElementById('p2');
        const p3 = document.getElementById('p3');
        const book = document.getElementById('myBook');
        const mainStage = document.getElementById('main-stage');
        const msg = document.getElementById('message');

        let step = 0;

        overlay.addEventListener('click', () => {
            overlay.style.display = 'none';
            music.play();
            document.getElementById('text1').classList.add('animate-now');
            setTimeout(() => {
                document.getElementById('text1').style.display = 'none';
                document.getElementById('text2').classList.add('animate-now');
            }, 3000);
            setTimeout(() => {
                document.getElementById('text2').style.display = 'none';
                mainStage.style.display = 'flex';
                step = 1;
            }, 6000);
        });

        mainStage.addEventListener('click', () => {
            if (step === 1) {
                p1.style.transform = "rotateY(-180deg)";
                step = 2;
            } else if (step === 2) {
                p2.style.transform = "rotateY(-180deg)";
                step = 3;
            } else if (step === 3) {
                p3.style.transform = "rotateY(-180deg)";
                step = 4;
                setTimeout(() => {
                    book.style.opacity = "0";
                    setTimeout(() => {
                        mainStage.style.display = "none";
                        msg.classList.add('show-msg');
                    }, 1000);
                }, 1200);
            }
        });

        function createStar() {
            const star = document.createElement('div');
            star.className = 'star';
            const size = Math.random() * 2 + 1 + 'px';
            star.style.left = Math.random() * 100 + 'vw';
            star.style.top = '-5vh';
            star.style.animationDuration = Math.random() * 2 + 3 + 's';
            document.body.appendChild(star);
            setTimeout(() => star.remove(), 4000);
        }
        setInterval(createStar, 150);
    </script>
</body>
</html>
